<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>System Builder - Motion Studio</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        :root { 
            --bg-main: #414142; --bg-sidebar: #1e1e1f; --panel-bg: #2d2d2e; --border-color: #3f3f40;
            --text-main: #f0f0f0; --text-muted: #aaaaaa; --accent: #2A9D8F; --danger: #E63946;
            --node-font-size: 13px; --node-font-weight: 600;
            
            /* Hardcoded Default Settings matching Screenshot */
            --link-width-1: 3.8px; --link-opacity-1: 0.60;
            --link-width-2: 2.1px; --link-opacity-2: 0.35;
            --link-width-3: 0.8px; --link-opacity-3: 0.20;
        }
        body { font-family: sans-serif; display: flex; margin: 0; background-color: var(--bg-main); color: var(--text-main); height: 100vh; overflow: hidden; }
        #sidebar { width: 360px; background-color: var(--bg-sidebar); padding: 20px; box-shadow: 5px 0 15px rgba(0,0,0,0.3); overflow-y: auto; z-index: 100; border-right: 1px solid var(--border-color); }
        #sidebar::-webkit-scrollbar { width: 6px; }
        #sidebar::-webkit-scrollbar-thumb { background-color: #555; border-radius: 3px; }
        
        /* HOVER CSS */
        .faded { opacity: 0.08 !important; }
        .link.highlighted { opacity: 1 !important; stroke-opacity: 1 !important; mix-blend-mode: normal !important; }
        .node.highlighted text { opacity: 1 !important; }

        h2 { margin-top: 15px; font-size: 10px; color: var(--accent); text-transform: uppercase; letter-spacing: 2px; border-bottom: 1px solid var(--border-color); padding-bottom: 4px; }
        .control-group { margin-bottom: 12px; padding: 10px; background-color: var(--panel-bg); border-radius: 8px; border: 1px solid var(--border-color); }
        .control-group label { display: flex; justify-content: space-between; font-size: 10px; color: var(--text-muted); font-weight: 700; margin-bottom: 5px; }
        input[type=range] { width: 100%; accent-color: var(--accent); cursor: pointer; }
        select, .text-input { width: 100%; padding: 7px; border-radius: 4px; border: 1px solid var(--border-color); background-color: var(--bg-main); color: var(--text-main); font-size: 11px; }
        
        .mode-toggle { display: flex; gap: 10px; margin-bottom: 15px; }
        .mode-btn { flex: 1; padding: 12px; text-align: center; background: var(--panel-bg); color: var(--text-muted); font-weight: bold; border-radius: 6px; cursor: pointer; border: 1px solid var(--border-color); font-size: 12px; }
        .mode-btn.active { background: var(--accent); color: white; }
        .mode-btn.edit-active { background: var(--danger); color: white; animation: pulse 2s infinite; }
        
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(230, 57, 70, 0.4); } 70% { box-shadow: 0 0 0 8px rgba(230, 57, 70, 0); } 100% { box-shadow: 0 0 0 0 rgba(230, 57, 70, 0); } }
        #edit-tools { display: none; margin-bottom: 15px; padding: 12px; background-color: rgba(230, 57, 70, 0.05); border-radius: 8px; border: 1px dashed var(--danger); }
        .drawing-selector { display: flex; flex-direction: column; gap: 5px; }
        .drawing-selector label { background: #222; padding: 6px; border-radius: 4px; cursor: pointer; display: flex; align-items: center; gap: 8px; font-size: 11px; }
        
        #main-content { flex-grow: 1; display: flex; justify-content: center; align-items: center; position: relative; overflow: hidden; }
        .node text { font-size: var(--node-font-size); font-weight: var(--node-font-weight); user-select: none; text-shadow: 0px 2px 4px rgba(0,0,0,0.8); transition: opacity 0.2s; }
        .link { fill: none !important; transition: stroke-opacity 0.2s, stroke-width 0.2s; mix-blend-mode: screen; pointer-events: none; }
        .link.edit-mode { pointer-events: all; cursor: pointer; }
        
        #node-modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 999; display: none; }
        #node-modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--bg-sidebar); padding: 25px; border-radius: 12px; z-index: 1000; display: none; width: 340px; border: 1px solid var(--accent); box-shadow: 0 20px 50px rgba(0,0,0,0.8); }
        .temp-drag-line { fill: none; stroke: var(--danger); stroke-width: 2px; pointer-events: none; stroke-dasharray: 4,4; }
        .color-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; padding: 4px 8px; background-color: var(--panel-bg); border-radius: 6px; border: 1px solid var(--border-color); }
        .group-name-edit { border: none; background: transparent; font-size: 11px; color: var(--text-main); font-weight: 600; width: 100%; outline: none; }
        .del-group-btn { background: none; border: none; color: #666; cursor: pointer; font-size: 14px; transition: 0.2s; padding: 0 4px; }
        
        .action-btn { width: 100%; font-weight: bold; padding: 10px; border-radius: 6px; border: none; margin-top: 8px; cursor: pointer; transition: 0.2s; }
        .action-btn:hover { filter: brightness(1.2); }
    </style>
</head>
<body>
<div id="node-modal-backdrop" onclick="closeModal()"></div>
<div id="node-modal">
    <h3 style="margin-top:0; font-size:14px; color:var(--accent)">✏️ Modify Node</h3>
    <input type="text" id="modal-node-name" class="text-input" style="margin-bottom: 12px;">
    <select id="modal-node-group" style="margin-bottom: 25px;"></select>
    <div style="display: flex; gap:10px">
        <button id="modal-btn-save" style="background:var(--accent); flex:1; border:none; color:white; padding:10px; border-radius:6px; cursor:pointer">Save</button>
        <button id="modal-btn-delete" style="background:var(--danger); flex:1; border:none; color:white; padding:10px; border-radius:6px; cursor:pointer">Delete</button>
        <button id="modal-btn-cancel" style="background:#555; flex:1; border:none; color:white; padding:10px; border-radius:6px; cursor:pointer">Back</button>
    </div>
</div>

<div id="sidebar">
    <div class="mode-toggle">
        <div id="btn-view" class="mode-btn active" onclick="setMode('view')">👁 View</div>
        <div id="btn-edit" class="mode-btn" onclick="setMode('edit')">✏️ Edit</div>
    </div>
    <button id="heatmap-toggle" class="mode-btn" style="width:100%; margin-bottom:8px" onclick="toggleHeatmap()">🔥 Heatmap: OFF</button>
    <button id="size-toggle" class="mode-btn active" style="width:100%" onclick="toggleSizeHeatmap()">🔘 Scaling: ON</button>

    <div id="edit-tools">
        <h2 style="color:var(--danger); border-color:var(--danger)">Drawing Mode</h2>
        <div class="drawing-selector">
            <label><input type="radio" name="conn-type" value="1" checked> <span style="color:white">Solid</span></label>
            <label><input type="radio" name="conn-type" value="2"> <span style="color:#aaa">Dashed</span></label>
            <label><input type="radio" name="conn-type" value="3"> <span style="color:#888">Dotted</span></label>
        </div>
    </div>

    <h2>Highways</h2>
    <div class="control-group">
        <label>Bundle Tension <span id="tension-val">0.45</span></label>
        <input type="range" id="tension-slider" min="0" max="1" step="0.01" value="0.45">
        <label style="margin-top:10px;">Ring Radius <span id="ring-val">0.90x</span></label>
        <input type="range" id="ring-slider" min="0.4" max="1.5" step="0.05" value="0.90">
        <label style="margin-top:10px;">Hub Pull <span id="hub-val">0.65</span></label>
        <input type="range" id="hub-slider" min="0.1" max="1" step="0.05" value="0.65">
    </div>

    <h2>Animation Studio</h2>
    <div class="control-group" style="border-color: var(--accent);">
        <button class="action-btn" style="background:var(--accent); color:white;" onclick="playAnimation()">🎬 Preview Animation</button>
        <button class="action-btn" style="background:#555; color:white;" onclick="exportPNGSequence()">🎥 Render Sequence (ZIP)</button>
    </div>

    <h2>Link Styles</h2>
    <div class="control-group">
        <label>Primary Thick <span id="val-w1">3.8px</span></label><input type="range" id="slider-w1" min="0.1" max="10" step="0.1" value="3.8">
        <label style="margin-top:8px;">Secondary Thick <span id="val-w2">2.1px</span></label><input type="range" id="slider-w2" min="0.1" max="10" step="0.1" value="2.1">
        <label style="margin-top:8px;">Tertiary Thick <span id="val-w3">0.8px</span></label><input type="range" id="slider-w3" min="0.1" max="10" step="0.1" value="0.8">
        
        <label style="margin-top:8px; color:var(--accent);">Opacities</label>
        <div style="display:flex; gap:5px;">
            <input type="range" id="slider-o1" min="0.01" max="1" step="0.01" value="0.60" title="Primary Opacity">
            <input type="range" id="slider-o2" min="0.01" max="1" step="0.01" value="0.35" title="Secondary Opacity">
            <input type="range" id="slider-o3" min="0.01" max="1" step="0.01" value="0.20" title="Tertiary Opacity">
        </div>
    </div>

    <h2>Layout & Size</h2>
    <div class="control-group">
        <label>Base Size <span id="bsize-val">6.0</span></label><input type="range" id="bsize-slider" min="2" max="15" step="0.5" value="6.0">
        <label style="margin-top:10px;">Scaling <span id="grow-val">1.9</span></label><input type="range" id="grow-slider" min="0" max="5" step="0.1" value="1.9">
        <label style="margin-top:10px;">Margin <span id="marg-val">10px</span></label><input type="range" id="marg-slider" min="0" max="50" step="1" value="10">
    </div>

    <h2>Canvas & Export Quality</h2>
    <div class="control-group">
        <label>Background Color</label>
        <input type="color" id="canvas-color" value="#414142" style="width:100%; border:none; height:30px; cursor:pointer;" oninput="document.documentElement.style.setProperty('--bg-main', this.value);">
        
        <label style="margin-top:10px;">Export Resolution</label>
        <select id="export-scale" style="margin-bottom: 10px;">
            <option value="1">1x (1600 x 1200)</option>
            <option value="2">2x (3200 x 2400) - Video Safe</option>
            <option value="3" selected>3x (4800 x 3600) - Ultra HD</option>
            <option value="4">4x (6400 x 4800) - Extreme</option>
        </select>
        
        <label><input type="checkbox" id="transparent-check" checked> Render Transparent BG</label>
    </div>

    <h2>Categories</h2>
    <div class="control-group">
        <input type="text" id="new-cat-name" class="text-input" placeholder="New Category Name...">
        <label style="margin-top:8px">Color: <input type="color" id="new-cat-color" value="#ffffff" style="width:40px; border:none; background:none; cursor:pointer"></label>
        <button onclick="addCategory()" class="action-btn" style="background:#555; color:white;">✨ Create Group</button>
    </div>

    <h2>New Node</h2>
    <div class="control-group">
        <input type="text" id="new-node-name" class="text-input" placeholder="Node Name...">
        <select id="new-node-category" style="margin-top:8px"></select>
        <button onclick="addNewNode()" class="action-btn" style="background:var(--accent); color:white;">➕ Add Node</button>
    </div>

    <h2>Group Manager</h2>
    <div id="color-controls"></div>

    <div class="export-panel" style="margin-top:20px">
        <button onclick="exportCSV()" class="action-btn" style="background:#f4a261; color:#111;">💾 Export CSV</button>
        <button onclick="exportSVG()" class="action-btn" style="background:#555; color:white;">🖼 Download Vector SVG</button>
        <button onclick="exportPNG()" class="action-btn" style="background:#555; color:white;">📷 Download High-Res PNG</button>
        <button onclick="clearLinesOnly()" class="action-btn" style="background:var(--danger); color:white; opacity:0.7;">🗑 Clear Highways</button>
    </div>
</div>
<div id="main-content">
    <div id="edit-toast" style="opacity:0; position:absolute; top:20px; right:20px; background:var(--danger); padding:15px; border-radius:8px; font-weight:bold; z-index:100; transition: 0.3s; box-shadow: 0 5px 15px rgba(0,0,0,0.5);">EDIT MODE ACTIVE</div>
    <div id="chart"></div>
</div>

<script>

    }

    function addCategory() {
        const n = document.getElementById("new-cat-name").value.trim(), c = document.getElementById("new-cat-color").value;
        if(!n || currentColors[n]) return alert("Invalid group name");
        currentColors[n] = c; document.getElementById("new-cat-name").value = ""; buildSidebar(); drawChart();
    }

    function renameCategory(oldName, newName) {
        if(!newName || oldName === newName || currentColors[newName]) return buildSidebar();
        currentColors[newName] = currentColors[oldName]; delete currentColors[oldName];
        nodesData.forEach(n => { if(n.group === oldName) { const oldId = n.id; n.group = newName; n.id = `${newName}.${n.name}`; updateHighwayIds(oldId, n.id); } });
        buildSidebar(); drawChart();
    }

    function deleteCategory(groupName) {
        if (Object.keys(currentColors).length <= 1) return alert("You must keep at least one category.");
        if (!confirm(`Delete group "${groupName}"? Nodes inside will move to another group.`)) return;
        let fallback = Object.keys(currentColors).find(g => g !== groupName);
        nodesData.forEach(n => { if(n.group === groupName) { const oldId = n.id; n.group = fallback; n.id = `${fallback}.${n.name}`; updateHighwayIds(oldId, n.id); } });
        delete currentColors[groupName]; buildSidebar(); drawChart();
    }

    function updateHighwayIds(oldId, newId) { nodesData.forEach(node => { node.imports.forEach(imp => { if (imp.id === oldId) imp.id = newId; }); }); }

    function setupSliders() {
        const sync = (id, rootVar, varName, isOpac=false) => { 
            const el = document.getElementById(id);
            if(el) {
                el.oninput = function() { 
                    const val = parseFloat(this.value);
                    if(varName === 'w1') w1 = val; if(varName === 'o1') o1 = val;
                    if(varName === 'w2') w2 = val; if(varName === 'o2') o2 = val;
                    if(varName === 'w3') w3 = val; if(varName === 'o3') o3 = val;
                    
                    const suffix = isOpac ? '' : 'px';
                    document.documentElement.style.setProperty(rootVar, this.value + suffix); 
                    
                    const textEl = document.getElementById(id.replace("slider-", "val-"));
                    if(textEl) textEl.innerText = this.value + suffix; 
                }; 
            }
        };
        
        sync("slider-w1", "--link-width-1", "w1"); sync("slider-w2", "--link-width-2", "w2"); sync("slider-w3", "--link-width-3", "w3");
        sync("slider-o1", "--link-opacity-1", "o1", true); sync("slider-o2", "--link-opacity-2", "o2", true); sync("slider-o3", "--link-opacity-3", "o3", true);
        
        document.getElementById("tension-slider").oninput = function() { tension = +this.value; document.getElementById("tension-val").innerText = tension.toFixed(2); updateLayoutFn(); };
        document.getElementById("ring-slider").oninput = function() { ringScale = +this.value; document.getElementById("ring-val").innerText = ringScale.toFixed(2) + "x"; updateLayoutFn(); };
        document.getElementById("hub-slider").oninput = function() { hubDepth = +this.value; document.getElementById("hub-val").innerText = hubDepth.toFixed(2); updateLayoutFn(); };
        document.getElementById("bsize-slider").oninput = function() { nodeRadius = +this.value; document.getElementById("bsize-val").innerText = nodeRadius.toFixed(1); updateLayoutFn(); };
        document.getElementById("grow-slider").oninput = function() { sizeInfluence = +this.value; document.getElementById("grow-val").innerText = sizeInfluence.toFixed(1); updateLayoutFn(); };
        document.getElementById("marg-slider").oninput = function() { nodeMargin = +this.value; document.getElementById("marg-val").innerText = nodeMargin + "px"; updateLayoutFn(); };
    }

    function toggleHeatmap() { isHeatmap = !isHeatmap; drawChart(); document.getElementById("heatmap-toggle").classList.toggle("active", isHeatmap); document.getElementById("heatmap-toggle").innerText = isHeatmap ? "🔥 Heatmap: ON" : "🔥 Heatmap: OFF"; }
    function toggleSizeHeatmap() { isSizeHeatmap = !isSizeHeatmap; drawChart(); document.getElementById("size-toggle").classList.toggle("active", isSizeHeatmap); document.getElementById("size-toggle").innerText = isSizeHeatmap ? "🔘 Scaling: ON" : "🔘 Scaling: OFF";}

    function setMode(m) {
        isEditMode = (m === 'edit');
        document.getElementById('btn-view').className = isEditMode ? 'mode-btn' : 'mode-btn active';
        document.getElementById('btn-edit').className = isEditMode ? 'mode-btn edit-active' : 'mode-btn';
        document.getElementById('edit-tools').style.display = isEditMode ? 'block' : 'none';
        
        const toast = document.getElementById('edit-toast');
        toast.style.opacity = isEditMode ? '1' : '0';
        toast.innerText = "EDIT MODE ACTIVE";
        toast.style.background = "var(--danger)";
        d3.selectAll(".link").classed("edit-mode", isEditMode);
        drawChart();
    }

    function closeModal() { document.getElementById('node-modal-backdrop').style.display = 'none'; document.getElementById('node-modal').style.display = 'none'; }
    document.getElementById('modal-btn-cancel').onclick = closeModal;
    document.getElementById('modal-btn-save').onclick = () => {
        const target = nodesData.find(n => n.id === editingNodeId), oldId = target.id, newName = document.getElementById('modal-node-name').value.trim(), newGroup = document.getElementById('modal-node-group').value;
        const newId = `${newGroup}.${newName}`; namesList[namesList.indexOf(target.name)] = newName; target.name = newName; target.group = newGroup; target.id = newId; updateHighwayIds(oldId, newId); closeModal(); drawChart();
    };
    document.getElementById('modal-btn-delete').onclick = () => { const oldId = editingNodeId; nodesData = nodesData.filter(n => n.id !== oldId); namesList = nodesData.map(n => n.name); nodesData.forEach(n => n.imports = n.imports.filter(imp => imp.id !== oldId)); closeModal(); drawChart(); };

    function addNewNode() {
        const n = document.getElementById("new-node-name").value.trim(), g = document.getElementById("new-node-category").value;
        if(!n || namesList.includes(n)) return alert("Duplicate node name.");
        nodesData.push({ id: `${g}.${n}`, name: n, group: g, imports: [] }); namesList.push(n); drawChart();
    }

    function clearLinesOnly() { if(confirm("Permanently delete all highway connections?")) { nodesData.forEach(n => n.imports = []); drawChart(); } }

    function drawChart() {
        d3.select("#chart").html(""); 
        if(nodesData.length === 0) return; 

        const table = [{id: "root", parentId: null}];
        Object.keys(currentColors).forEach(g => table.push({id: g, parentId: "root"}));
        nodesData.forEach(d => table.push({ ...d, parentId: d.group }));

        const root = d3.stratify().id(d => d.id).parentId(d => d.parentId)(table);
        
        // Helper to safely get the number of connections for sizes/opacity
        const getImportsLen = (node) => (node.data && node.data.imports) ? node.data.imports.length : 0;
        
        let dynamicRadius = (Math.min(width, height)/2 - 350) * ringScale;
        const cluster = d3.cluster().size([2 * Math.PI, dynamicRadius]).separation((a, b) => {
            const rA = isSizeHeatmap ? (nodeRadius + (getImportsLen(a) * sizeInfluence)) : nodeRadius;
            const rB = isSizeHeatmap ? (nodeRadius + (getImportsLen(b) * sizeInfluence)) : nodeRadius;
            return (a.parent === b.parent ? 1.0 : 2.5) * ((rA + rB + nodeMargin) / dynamicRadius);
        });
        
        cluster(root); root.each(d => { if (d.depth === 1) d.y = dynamicRadius * hubDepth; });

        const svg = d3.select("#chart").append("svg").attr("width", width).attr("height", height);
        const g = svg.append("g").attr("transform", `translate(${width/2},${height/2})`);
        
        const nodeById = new Map(root.leaves().map(d => [d.id, d])), links = [];
        root.leaves().forEach(d => { if (d.data.imports) d.data.imports.forEach(imp => { const t = nodeById.get(imp.id); if (t && d.id < t.id) { const p = d.path(t); p.connType = imp.type || 1; p.sourceNode = d; p.targetNode = t; links.push(p); } }); });
        
        const line = d3.lineRadial().curve(d3.curveBundle.beta(tension)).radius(d => d.y).angle(d => d.x);
        const linkElements = g.append("g").selectAll("path").data(links).join("path")
            .attr("class", d => "link" + (isEditMode ? " edit-mode" : ""))
            .attr("data-conn-type", d => d.connType)
            .attr("d", d => line(d))
            .style("stroke-width", d => `var(--link-width-${d.connType})`)
            .style("stroke-opacity", d => isEditMode ? 0.8 : `var(--link-opacity-${d.connType})`)
            .style("stroke-dasharray", d => d.connType==2 ? "8,5" : d.connType==3 ? "2,3" : "none")
            .style("stroke", d => {
                const id = `grad-${cleanId(d.sourceNode.id)}-${cleanId(d.targetNode.id)}`;
                const defs = svg.select("defs").empty() ? svg.append("defs") : svg.select("defs");
                if (defs.select(`#${id}`).empty()) {
                    const grad = defs.append("linearGradient").attr("id", id).attr("gradientUnits", "userSpaceOnUse")
                        .attr("x1", d.sourceNode.y * Math.cos(d.sourceNode.x - Math.PI/2)).attr("y1", d.sourceNode.y * Math.sin(d.sourceNode.x - Math.PI/2))
                        .attr("x2", d.targetNode.y * Math.cos(d.targetNode.x - Math.PI/2)).attr("y2", d.targetNode.y * Math.sin(d.targetNode.x - Math.PI/2));
                    grad.append("stop").attr("offset", "0%").attr("stop-color", currentColors[d.sourceNode.data.group]);
                    grad.append("stop").attr("offset", "100%").attr("stop-color", currentColors[d.targetNode.data.group]);
                }
                return `url(#${id})`;
            })
            .on("dblclick", function(e, d) {
                if (!isEditMode) return;
                const sn = nodesData.find(n => n.id === d.sourceNode.id), tn = nodesData.find(n => n.id === d.targetNode.id);
                sn.imports = sn.imports.filter(i => i.id !== tn.id); tn.imports = tn.imports.filter(i => i.id !== sn.id); drawChart();
            });

        const nodeSelection = g.append("g").selectAll("g").data(root.leaves()).join("g").attr("class", "node").attr("transform", d => `rotate(${d.x * 180 / Math.PI - 90}) translate(${d.y},0)`);
        let maxConns = d3.max(nodesData, d => d.imports.length) || 1;
        const opScale = d3.scaleLinear().domain([0, maxConns]).range([0.2, 1.0]);

        nodeSelection.append("circle").style("fill", d => currentColors[d.data.group]);
        nodeSelection.append("text").attr("dy", "0.31em").attr("text-anchor", d => d.x < Math.PI ? "start" : "end").attr("transform", d => d.x >= Math.PI ? "rotate(180)" : null).style("fill", d => currentColors[d.data.group]);

        // Bulletproof layout update function guarantees scaling and heatmap apply correctly
        updateLayoutFn = () => {
            dynamicRadius = (Math.min(width, height)/2 - 350) * ringScale;
            cluster.size([2 * Math.PI, dynamicRadius])(root); 
            root.each(d => { if (d.depth === 1) d.y = dynamicRadius * hubDepth; });
            
            line.curve(d3.curveBundle.beta(tension)); 
            linkElements.attr("d", d => line(d));
            nodeSelection.attr("transform", d => `rotate(${d.x * 180 / Math.PI - 90}) translate(${d.y},0)`);
            
            nodeSelection.select("circle")
                .attr("r", d => isSizeHeatmap ? (nodeRadius + (getImportsLen(d) * sizeInfluence)) : nodeRadius)
                .style("opacity", d => isHeatmap ? opScale(getImportsLen(d)) : 1);
                
            nodeSelection.select("text")
                .attr("x", d => { const curR = isSizeHeatmap ? (nodeRadius + (getImportsLen(d) * sizeInfluence)) : nodeRadius; return d.x < Math.PI ? curR + 10 : -(curR + 10); })
                .text(d => isHeatmap ? `${d.data.name} (${getImportsLen(d)})` : d.data.name);
        };

        // Explicitly fire layout logic immediately to solidify settings
        updateLayoutFn();

        nodeSelection.on("mouseover", function(e, d) {
            if(isEditMode) return;
            d3.selectAll(".node").classed("faded", true).classed("highlighted", false);
            d3.selectAll(".link").classed("faded", true).classed("highlighted", false);
            d3.select(this).classed("faded", false).classed("highlighted", true);
            const activeLinks = linkElements.filter(l => l.sourceNode.id === d.id || l.targetNode.id === d.id);
            activeLinks.classed("faded", false).classed("highlighted", true).raise();
            activeLinks.each(l => { 
                d3.selectAll(".node").filter(n => n.id === l.sourceNode.id || n.id === l.targetNode.id)
                  .classed("faded", false).classed("highlighted", true); 
            });
        }).on("mouseout", () => {
            if(isEditMode) return;
            d3.selectAll(".node").classed("faded", false).classed("highlighted", false);
            d3.selectAll(".link").classed("faded", false).classed("highlighted", false);
        }).on("dblclick", (e, d) => { if (isEditMode) openModal(d); });

        let tLine = g.append("path").attr("class", "temp-drag-line").style("display", "none"), hT = null;
        nodeSelection.on("mouseenter.drag", (e, d) => hT = d).on("mouseleave.drag", () => hT = null);
        nodeSelection.call(d3.drag().on("start", function() { if(isEditMode) tLine.style("display", "block"); }).on("drag", function(e) { if(isEditMode) { const m = d3.pointer(e, g.node()); tLine.attr("d", `M${d3.select(this).datum().y*Math.cos(d3.select(this).datum().x-Math.PI/2)},${d3.select(this).datum().y*Math.sin(d3.select(this).datum().x-Math.PI/2)} L${m[0]},${m[1]}`); } })
            .on("end", function(e, d) { tLine.style("display", "none"); if(hT && hT !== d) { const type = +document.querySelector('input[name="conn-type"]:checked').value; const sn = nodesData.find(n => n.id === d.id), tn = nodesData.find(n => n.id === hT.id); if(!sn.imports.find(i=>i.id===tn.id)) { sn.imports.push({id:tn.id, type}); tn.imports.push({id:sn.id, type}); drawChart(); } } }));
    }

    // ==========================================
    // THE ULTIMATE EXPORT ENGINE
    // ==========================================
    function getSVGSource(scaleMultiplier = 1) {
        const svgClone = document.querySelector('svg').cloneNode(true);
        svgClone.setAttribute("xmlns", "http://www.w3.org/2000/svg");
        
        if (scaleMultiplier > 1) {
            svgClone.setAttribute("width", width * scaleMultiplier);
            svgClone.setAttribute("height", height * scaleMultiplier);
            svgClone.setAttribute("viewBox", `0 0 ${width} ${height}`);
        }

        // INJECT INLINE STYLE BLOCK SO THE RENDERER HAS NO CHOICE BUT TO OBEY
        const styleDef = document.createElement('style');
        styleDef.innerHTML = `
            :root {
                --link-width-1: ${w1}px; --link-opacity-1: ${o1};
                --link-width-2: ${w2}px; --link-opacity-2: ${o2};
                --link-width-3: ${w3}px; --link-opacity-3: ${o3};
            }
            .link { fill: none; transition: none; mix-blend-mode: screen; }
            .node text { font-family: sans-serif; font-size: 13px; font-weight: 600; text-shadow: 0px 2px 4px rgba(0,0,0,0.8); }
        `;
        svgClone.insertBefore(styleDef, svgClone.firstChild);

        // Guarantee text formatting carries over
        svgClone.querySelectorAll('text').forEach(t => { 
            t.setAttribute('font-family', 'sans-serif'); 
            t.setAttribute('fill', t.style.fill); 
            t.setAttribute('font-size', '13px'); 
            t.setAttribute('font-weight', '600'); 
        });
        
        return new XMLSerializer().serializeToString(svgClone);
    }

    function exportPNG() {
        const scale = parseInt(document.getElementById('export-scale').value);
        const exportW = width * scale;
        const exportH = height * scale;

        const canvas = document.createElement("canvas");
        canvas.width = exportW; canvas.height = exportH;
        const ctx = canvas.getContext("2d");
        
        const img = new Image();
        img.onload = () => {
            const bg = document.getElementById('canvas-color').value;
            const trans = document.getElementById('transparent-check').checked;
            if(!trans) { ctx.fillStyle = bg; ctx.fillRect(0,0,exportW,exportH); }
            
            ctx.drawImage(img, 0, 0, exportW, exportH);
            const l = document.createElement("a");
            l.href = canvas.toDataURL("image/png");
            l.download = "system_map_HighRes.png";
            l.click();
        };
        img.src = 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(getSVGSource(scale))));
    }

    function playAnimation() {
        const targetTension = parseFloat(document.getElementById('tension-slider').value);
        tension = 1.0; document.getElementById('tension-slider').value = tension; updateLayoutFn();
        
        d3.select(document.getElementById('tension-slider')).transition().duration(10000).ease(d3.easeCubicInOut)
            .tween("tension", function() {
                const i = d3.interpolate(1.0, targetTension);
                return function(t) {
                    tension = i(t);
                    document.getElementById('tension-slider').value = tension;
                    document.getElementById('tension-val').innerText = tension.toFixed(2);
                    updateLayoutFn();
                };
            });
    }

    async function exportPNGSequence() {
        const scale = parseInt(document.getElementById('export-scale').value);
        const exportW = width * scale;
        const exportH = height * scale;
        
        const toast = document.getElementById('edit-toast');
        toast.style.opacity = '1';
        toast.style.background = "var(--danger)";
        
        const fps = 30;
        const durationSec = 10;
        const totalFrames = fps * durationSec;
        
        const zip = new JSZip();
        const folder = zip.folder("animation_frames");
        
        const canvas = document.createElement("canvas");
        canvas.width = exportW; canvas.height = exportH;
        const ctx = canvas.getContext("2d");
        
        const isTransparent = document.getElementById('transparent-check').checked;
        const bg = document.getElementById('canvas-color').value;
        const targetTension = parseFloat(document.getElementById('tension-slider').value);

        for (let frame = 0; frame <= totalFrames; frame++) {
            toast.innerText = `⏳ RENDERING FRAME ${frame}/${totalFrames} at ${scale}x Scale...`;
            
            let t = frame / totalFrames;
            const easeT = t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
            
            tension = 1.0 - (easeT * (1.0 - targetTension));
            document.getElementById('tension-slider').value = tension;
            document.getElementById('tension-val').innerText = tension.toFixed(2);
            updateLayoutFn();
            
            await new Promise((resolve) => {
                const img = new Image();
                img.onload = () => {
                    ctx.clearRect(0, 0, exportW, exportH);
                    if (!isTransparent) {
                        ctx.fillStyle = bg;
                        ctx.fillRect(0, 0, exportW, exportH);
                    }
                    ctx.drawImage(img, 0, 0, exportW, exportH);
                    const dataURL = canvas.toDataURL("image/png");
                    const base64Data = dataURL.split(',')[1];
                    const frameStr = String(frame).padStart(4, '0');
                    folder.file(`frame_${frameStr}.png`, base64Data, {base64: true});
                    resolve();
                };
                img.src = 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(getSVGSource(scale))));
            });
        }
        
        tension = targetTension;
        document.getElementById('tension-slider').value = tension;
        document.getElementById('tension-val').innerText = tension.toFixed(2);
        updateLayoutFn();

        toast.innerText = "📦 ZIPPING FRAMES (MAY TAKE A FEW MINUTES)...";
        toast.style.background = "#f4a261";
        toast.style.color = "#111";

        zip.generateAsync({type:"blob"}).then(function(content) {
            const a = document.createElement("a");
            a.href = URL.createObjectURL(content);
            a.download = `animation_sequence_${scale}x.zip`;
            a.click();
            
            toast.innerText = "✅ SEQUENCE SAVED!";
            toast.style.background = "#2A9D8F";
            toast.style.color = "white";
            setTimeout(() => toast.style.opacity = '0', 3000);
        });
    }

    function exportCSV() { const names = nodesData.map(n => n.name); let csv = "Node," + names.join(",") + "\\n"; nodesData.forEach(s => { let r = [s.name]; names.forEach(tN => { const tNode = nodesData.find(n => n.name === tN); const l = s.imports.find(i => i.id === tNode.id); r.push(l ? l.type : 0); }); csv += r.join(",") + "\\n"; }); const b = new Blob([csv], {type:'text/csv'}); const l = document.createElement("a"); l.href = URL.createObjectURL(b); l.download = "matrix.csv"; l.click(); }
    function exportSVG() { const l = document.createElement("a"); l.href = URL.createObjectURL(new Blob([getSVGSource(1)], {type: 'image/svg+xml;charset=utf-8'})); l.download = "map.svg"; l.click(); }

    buildSidebar(); setupSliders(); drawChart();
</script>
