<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fruit Tree System Builder</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        :root { 
            --link-width: 1.5px; 
            --link-opacity: 0.3; 
            --bg-main: #414142;
            --bg-sidebar: #2b2b2c;
            --panel-bg: #363637;
            --border-color: #4a4a4b;
            --text-main: #f0f0f0;
            --text-muted: #aaaaaa;
            --accent: #2A9D8F;
            --danger: #E63946;
        }
        body { font-family: Helvetica Neue, Helvetica, Arial, sans-serif; display: flex; margin: 0; background-color: var(--bg-main); color: var(--text-main); height: 100vh; overflow: hidden; }
        #sidebar { width: 360px; background-color: var(--bg-sidebar); padding: 15px 20px; box-shadow: 2px 0 10px rgba(0,0,0,0.5); overflow-y: auto; display: flex; flex-direction: column; z-index: 10; border-right: 1px solid #222; }
        h2 { margin-top: 10px; font-size: 13px; color: var(--text-main); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid var(--border-color); padding-bottom: 5px; }
        .control-group { margin-bottom: 15px; padding: 12px; background-color: var(--panel-bg); border-radius: 8px; border: 1px solid var(--border-color); }
        .control-group label { display: flex; justify-content: space-between; font-size: 11px; color: var(--text-muted); font-weight: 700; margin-bottom: 6px; }
        .control-group span { color: var(--accent); }
        input[type=range] { width: 100%; cursor: pointer; accent-color: var(--accent); background: transparent; }
        select, .text-input { width: 100%; padding: 8px; box-sizing: border-box; border-radius: 4px; border: 1px solid var(--border-color); background-color: var(--bg-main); color: var(--text-main); font-size: 13px; }
        .mode-toggle { display: flex; gap: 10px; margin-bottom: 10px; }
        .mode-btn { flex: 1; padding: 10px; text-align: center; background: var(--panel-bg); color: var(--text-muted); font-weight: bold; border-radius: 6px; cursor: pointer; border: 1px solid var(--border-color); font-size: 13px; transition: 0.2s; }
        .mode-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
        .mode-btn.edit-active { background: var(--danger); color: white; border-color: var(--danger); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(230, 57, 70, 0.4); } 70% { box-shadow: 0 0 0 8px rgba(230, 57, 70, 0); } 100% { box-shadow: 0 0 0 0 rgba(230, 57, 70, 0); } }
        #edit-tools { display: none; margin-bottom: 10px; padding: 10px; background-color: rgba(230, 57, 70, 0.1); border-radius: 8px; border: 1px solid var(--danger); }
        .color-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; padding: 6px 10px; background-color: var(--panel-bg); border-radius: 6px; border: 1px solid var(--border-color); }
        .group-name-input { border: none; background: transparent; font-size: 13px; color: var(--text-main); font-weight: 600; width: 200px; outline: none; border-bottom: 1px dashed transparent; }
        .group-name-input:focus { border-bottom-color: var(--accent); }
        input[type="color"] { border: 1px solid var(--border-color); border-radius: 4px; width: 25px; height: 22px; cursor: pointer; padding: 0; background: none; }
        .export-panel { margin-top: auto; padding-top: 15px; display: flex; flex-direction: column; gap: 8px; border-top: 1px solid var(--border-color); }
        button { background-color: #555; color: white; border: none; padding: 10px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: bold; transition: 0.2s; }
        button:hover { background-color: #777; }
        .save-btn { background-color: #F4A261; color: #111; }
        #main-content { flex-grow: 1; display: flex; justify-content: center; align-items: center; background-color: var(--bg-main); position: relative; overflow: hidden; }
        .node text { font-size: 13px; font-weight: 600; cursor: pointer; user-select: none; text-shadow: 0px 2px 4px rgba(0,0,0,0.8); transition: opacity 0.2s; }
        .link { fill: none; transition: stroke-opacity 0.2s, stroke-width 0.2s; mix-blend-mode: screen; }
        .link--target { stroke-opacity: 1 !important; stroke-width: calc(var(--link-width) + 2.5px) !important; z-index: 100; mix-blend-mode: normal; }
        .node--fade { opacity: 0.1; }
        .link--fade { stroke-opacity: 0.02 !important; }
        .temp-drag-line { fill: none; stroke: var(--danger); stroke-width: 3px; pointer-events: none; }
        #node-modal-backdrop { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); z-index: 999; display: none; }
        #node-modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--bg-sidebar); padding: 25px; border-radius: 12px; box-shadow: 0 10px 40px rgba(0,0,0,0.8); z-index: 1000; display: none; width: 320px; border: 1px solid var(--border-color); }
    </style>
</head>
<body>

<div id="node-modal-backdrop"></div>
<div id="node-modal">
    <h3>✏️ Edit Node</h3>
    <label style="display:block; font-size:11px; margin-bottom:5px; color:var(--text-muted)">NODE NAME</label>
    <input type="text" id="modal-node-name" class="text-input" style="margin-bottom: 15px;">
    <label style="display:block; font-size:11px; margin-bottom:5px; color:var(--text-muted)">CATEGORY GROUP</label>
    <select id="modal-node-group" style="margin-bottom: 25px;"></select>
    <div style="display: flex; gap:10px">
        <button id="modal-btn-save" style="background:var(--accent); flex:1">Save</button>
        <button id="modal-btn-delete" style="background:var(--danger); flex:1">Delete</button>
        <button id="modal-btn-cancel" style="background:#555; flex:1">Cancel</button>
    </div>
</div>

<div id="sidebar">
    <div class="mode-toggle">
        <div id="btn-view" class="mode-btn active" onclick="setMode('view')">👁 View</div>
        <div id="btn-edit" class="mode-btn" onclick="setMode('edit')">✏️ Edit</div>
    </div>

    <div id="edit-tools">
        <label style="font-size: 10px; font-weight: bold; color: var(--danger);">DRAWING MODE:</label>
        <div class="radio-container" style="display:flex; flex-direction:column; gap:8px; margin-top:5px">
            <label style="font-size:12px"><input type="radio" name="conn-type" value="1" checked> Primary (Solid)</label>
            <label style="font-size:12px"><input type="radio" name="conn-type" value="2"> Secondary (Dotted)</label>
        </div>
    </div>

    <h2>Highway & Geometry</h2>
    <div class="control-group">
        <label>Ring Radius <span id="ring-size-val">1.0x</span></label>
        <input type="range" id="ring-size-slider" min="0.4" max="1.5" step="0.05" value="1.0">
        <label style="margin-top:10px;">Bundle Tension <span id="tension-val">0.45</span></label>
        <input type="range" id="tension-slider" min="0" max="1" step="0.01" value="0.45">
    </div>

    <h2>Layout & Spacing</h2>
    <div class="control-group">
        <label>Node Size <span id="node-size-val">5.0</span></label>
        <input type="range" id="node-size-slider" min="2" max="15" step="0.5" value="5">
        <label style="margin-top:10px;">Node Spacing <span id="node-space-val">1.0</span></label>
        <input type="range" id="node-space-slider" min="0.1" max="5" step="0.1" value="1">
        <label style="margin-top:10px;">Group Spacing <span id="group-space-val">2.0</span></label>
        <input type="range" id="group-space-slider" min="0.1" max="10" step="0.1" value="2">
    </div>

    <h2>Visual Settings</h2>
    <div class="control-group">
        <label>Line Style</label>
        <select id="line-style-selector" style="margin-bottom: 10px;">
            <option value="grey">Ghost Lines</option>
            <option value="source">Source Color</option>
            <option value="gradient" selected>Dynamic Gradient</option>
        </select>
        <label>Thickness <span id="thickness-val">1.5px</span></label>
        <input type="range" id="thickness-slider" min="0.1" max="5" step="0.1" value="1.5">
        <label style="margin-top:10px;">Base Opacity <span id="opacity-val">0.30</span></label>
        <input type="range" id="opacity-slider" min="0.01" max="1" step="0.01" value="0.30">
    </div>

    <h2>Add Node</h2>
    <div class="control-group">
        <input type="text" id="new-node-name" class="text-input" placeholder="Name..." style="margin-bottom: 8px;">
        <select id="new-node-category"></select>
        <button id="btn-add-node" style="background:var(--accent); width:100%; margin-top:8px">➕ Add Node</button>
    </div>

    <h2>Category Colors</h2>
    <div id="color-controls"></div>
    
    <div class="export-panel">
        <button class="save-btn" onclick="exportCSV()">💾 Save Connections (CSV)</button>
        <button onclick="exportSVG()">Download SVG</button>
        <button onclick="exportPNG()">Download PNG</button>
    </div>
</div>

<div id="main-content">
    <div id="edit-toast" style="opacity:0; pointer-events:none">Edit Mode: Drag to connect / Double-click to Edit</div>
    <div id="chart"></div>
</div>

    let currentColors = {"Legal (Red)": "#E63946", "Plant (Yellow)": "#E9C46A", "Logistics (Orange)": "#F4A261", "Deliver (Blue)": "#83C5BE", "Pack (Pink)": "#B5838D"};

    // --- Build Sidebar ---
    function buildSidebar() {
        const controlsDiv = document.getElementById("color-controls");
        const addNodeSelect = document.getElementById("new-node-category");
        const modalSelect = document.getElementById("modal-node-group");
        
        controlsDiv.innerHTML = ""; addNodeSelect.innerHTML = ""; modalSelect.innerHTML = "";

        Object.keys(currentColors).forEach(groupName => {
            const row = document.createElement("div"); row.className = "color-row";
            const nameInput = document.createElement("input"); nameInput.className = "group-name-input"; nameInput.value = groupName;
            nameInput.addEventListener("change", (e) => renameGroup(groupName, e.target.value.trim()));
            
            const colorInput = document.createElement("input"); colorInput.type = "color"; colorInput.value = currentColors[groupName];
            colorInput.addEventListener("input", (e) => { currentColors[groupName] = e.target.value; drawChart(); });
            
            row.appendChild(nameInput); row.appendChild(colorInput); controlsDiv.appendChild(row);
            addNodeSelect.appendChild(new Option(groupName, groupName));
            modalSelect.appendChild(new Option(groupName, groupName));
        });
    }

    function renameGroup(oldName, newName) {
        if(!newName || oldName === newName || currentColors[newName]) return buildSidebar();
        currentColors[newName] = currentColors[oldName];
        delete currentColors[oldName];
        nodesData.forEach(n => { if(n.group === oldName) { n.group = newName; n.id = `${newName}.${n.name}`; } });
        buildSidebar(); drawChart();
    }

    // --- Sliders ---
    document.getElementById("tension-slider").oninput = function() { tension = +this.value; document.getElementById("tension-val").innerText = tension.toFixed(2); updateLayoutFn(); };
    document.getElementById("ring-size-slider").oninput = function() { ringScale = +this.value; document.getElementById("ring-size-val").innerText = ringScale.toFixed(2) + "x"; updateLayoutFn(); };
    document.getElementById("node-size-slider").oninput = function() { nodeRadius = +this.value; document.getElementById("node-size-val").innerText = nodeRadius.toFixed(1); updateLayoutFn(); };
    document.getElementById("node-space-slider").oninput = function() { nodeSpacing = +this.value; document.getElementById("node-space-val").innerText = nodeSpacing.toFixed(1); updateLayoutFn(); };
    document.getElementById("group-space-slider").oninput = function() { groupSpacing = +this.value; document.getElementById("group-space-val").innerText = groupSpacing.toFixed(1); updateLayoutFn(); };
    document.getElementById("thickness-slider").oninput = function() { document.documentElement.style.setProperty('--link-width', this.value + 'px'); document.getElementById("thickness-val").innerText = this.value + "px"; };
    document.getElementById("opacity-slider").oninput = function() { document.documentElement.style.setProperty('--link-opacity', this.value); document.getElementById("opacity-val").innerText = parseFloat(this.value).toFixed(2); };
    document.getElementById("line-style-selector").onchange = function() { lineStyle = this.value; drawChart(); };

    function setMode(mode) {
        isEditMode = (mode === 'edit');
        document.getElementById('btn-view').className = isEditMode ? 'mode-btn' : 'mode-btn active';
        document.getElementById('btn-edit').className = isEditMode ? 'mode-btn edit-active' : 'mode-btn';
        document.getElementById('edit-tools').style.display = isEditMode ? 'block' : 'none';
        document.getElementById('edit-toast').style.opacity = isEditMode ? '1' : '0';
    }

    // --- Node Modal ---
    function openModal(d) {
        editingNodeId = d.data.id;
        document.getElementById('modal-node-name').value = d.data.name;
        document.getElementById('modal-node-group').value = d.data.group;
        document.getElementById('node-modal-backdrop').style.display = 'block';
        document.getElementById('node-modal').style.display = 'block';
    }
    function closeModal() { document.getElementById('node-modal-backdrop').style.display = 'none'; document.getElementById('node-modal').style.display = 'none'; }
    document.getElementById('modal-btn-cancel').onclick = closeModal;
    document.getElementById('modal-btn-save').onclick = () => {
        const newName = document.getElementById('modal-node-name').value.trim();
        const newGroup = document.getElementById('modal-node-group').value;
        const target = nodesData.find(n => n.id === editingNodeId);
        target.name = newName; target.group = newGroup; target.id = `${newGroup}.${newName}`;
        closeModal(); drawChart();
    };
    document.getElementById('modal-btn-delete').onclick = () => {
        nodesData = nodesData.filter(n => n.id !== editingNodeId);
        closeModal(); drawChart();
    };

    // --- Core Draw ---
    function drawChart() {
        d3.select("#chart").html(""); 
        const table = [{id: "root", parentId: null}];
        Object.keys(currentColors).forEach(g => table.push({id: g, parentId: "root"}));
        nodesData.forEach(d => table.push({...d, parentId: d.group}));
        const root = d3.stratify().id(d => d.id).parentId(d => d.parentId)(table).sort((a,b)=>d3.ascending(a.id, b.id));
        
        let dynamicRadius = (Math.min(width, height)/2 - 250) * ringScale;
        const cluster = d3.cluster().size([2 * Math.PI, dynamicRadius]).separation((a,b) => a.parent === b.parent ? nodeSpacing : groupSpacing);
        cluster(root);
        
        const svg = d3.select("#chart").append("svg").attr("width", width).attr("height", height);
        const g = svg.append("g").attr("transform", `translate(${width/2},${height/2})`);
        const nodeById = new Map(root.leaves().map(d => [d.id, d]));
        const links = [];
        root.leaves().forEach(d => {
            if (d.data.imports) d.data.imports.forEach(imp => {
                const target = nodeById.get(imp.id);
                if (target && d.id < target.id) {
                    const path = d.path(target); path.connType = imp.type; path.sourceNode = d; path.targetNode = target; links.push(path);
                }
            });
        });

        const defs = svg.append("defs");
        const line = d3.lineRadial().curve(d3.curveBundle.beta(tension)).radius(d => d.y).angle(d => d.x);

        const linkElements = g.append("g").selectAll("path").data(links).join("path").attr("class", "link").attr("d", d => line(d))
            .style("stroke", d => {
                if (lineStyle === "gradient") {
                    const id = `grad-${cleanId(d.sourceNode.id)}-${cleanId(d.targetNode.id)}`;
                    if (defs.select(`#${id}`).empty()) {
                        const grad = defs.append("linearGradient").attr("id", id).attr("gradientUnits", "userSpaceOnUse")
                            .attr("x1", d.sourceNode.y * Math.cos(d.sourceNode.x - Math.PI/2))
                            .attr("y1", d.sourceNode.y * Math.sin(d.sourceNode.x - Math.PI/2))
                            .attr("x2", d.targetNode.y * Math.cos(d.targetNode.x - Math.PI/2))
                            .attr("y2", d.targetNode.y * Math.sin(d.targetNode.x - Math.PI/2));
                        grad.append("stop").attr("offset", "0%").attr("stop-color", currentColors[d.sourceNode.data.group]);
                        grad.append("stop").attr("offset", "100%").attr("stop-color", currentColors[d.targetNode.data.group]);
                    }
                    return `url(#${id})`;
                }
                return lineStyle === "source" ? currentColors[d.sourceNode.data.group] : "#777";
            })
            .style("stroke-dasharray", d => d.connType === 2 ? "6,6" : "none")
            .style("stroke-opacity", "var(--link-opacity)").style("stroke-width", "var(--link-width)");

        const node = g.append("g").selectAll("g").data(root.leaves()).join("g").attr("class", "node").attr("transform", d => `rotate(${d.x * 180 / Math.PI - 90}) translate(${d.y},0)`);
        node.append("circle").attr("r", nodeRadius).style("fill", d => currentColors[d.data.group]);
        node.append("text").attr("dy", "0.31em").attr("x", d => d.x < Math.PI ? nodeRadius+10 : -(nodeRadius+10)).attr("text-anchor", d => d.x < Math.PI ? "start" : "end").attr("transform", d => d.x >= Math.PI ? "rotate(180)" : null).style("fill", d => currentColors[d.data.group]).text(d => d.data.name);

        updateLayoutFn = () => {
            dynamicRadius = (Math.min(width, height)/2 - 250) * ringScale;
            cluster.separation((a,b) => a.parent === b.parent ? nodeSpacing : groupSpacing).size([2*Math.PI, dynamicRadius])(root);
            line.curve(d3.curveBundle.beta(tension));
            linkElements.attr("d", d => line(d));
            node.attr("transform", d => `rotate(${d.x * 180 / Math.PI - 90}) translate(${d.y},0)`);
            node.selectAll("circle").attr("r", nodeRadius);
            node.selectAll("text").attr("x", d => d.x < Math.PI ? nodeRadius+10 : -(nodeRadius+10)).attr("text-anchor", d => d.x < Math.PI ? "start" : "end").attr("transform", d => d.x >= Math.PI ? "rotate(180)" : null);
        };

        node.on("mouseover", function(e, d) {
            if (isEditMode) return;
            node.classed("node--fade", true); linkElements.classed("link--fade", true);
            d3.select(this).classed("node--fade", false);
            linkElements.filter(l => l.sourceNode === d || l.targetNode === d).classed("link--fade", false).classed("link--target", true).raise();
            linkElements.filter(l => l.sourceNode === d || l.targetNode === d).each(l => node.filter(n => n === l.sourceNode || n === l.targetNode).classed("node--fade", false));
        }).on("mouseout", () => { linkElements.classed("link--fade", false).classed("link--target", false); node.classed("node--fade", false); })
        .on("dblclick", (e, d) => { if (isEditMode) openModal(d); });

        let tempLine = g.append("path").attr("class", "temp-drag-line").style("display", "none");
        let hoveredT = null;
        node.on("mouseenter.drag", (e, d) => hoveredT = d).on("mouseleave.drag", () => hoveredT = null);
        node.call(d3.drag().on("start", function(e, d) { if(!isEditMode) return; tempLine.style("display", "block"); })
            .on("drag", function(e, d) { if(!isEditMode) return; const m = d3.pointer(e, g.node()); tempLine.attr("d", `M${d.y*Math.cos(d.x-Math.PI/2)},${d.y*Math.sin(d.x-Math.PI/2)} L${m[0]},${m[1]}`); })
            .on("end", function(e, d) { tempLine.style("display", "none"); if(hoveredT && hoveredT !== d) {
                const sn = nodesData.find(n => n.id === d.id), tn = nodesData.find(n => n.id === hoveredT.id);
                const idx = sn.imports.findIndex(i => i.id === tn.id);
                if(idx !== -1) { sn.imports.splice(idx,1); tn.imports = tn.imports.filter(i=>i.id!==sn.id); }
                else { const type = +document.querySelector('input[name="conn-type"]:checked').value; sn.imports.push({id:tn.id, type}); tn.imports.push({id:sn.id, type}); }
                drawChart();
            } }));
    }
    drawChart(); buildSidebar();

    function exportCSV() {
        let csv = "Node," + namesList.join(",") + "\n";
        namesList.forEach(s => {
            let r = [s], sn = nodesData.find(n => n.name === s);
            namesList.forEach(t => { if(s===t) { r.push(0); return; } let tn = nodesData.find(n => n.name === t), imp = sn ? sn.imports.find(i => i.id === tn.id) : null; r.push(imp ? imp.type : 0); });
            csv += r.join(",") + "\n";
        });
        const b = new Blob([csv], {type:'text/csv'}), u = URL.createObjectURL(b), l = document.createElement("a");
        l.href = u; l.download = "system_matrix_edited.csv"; l.click();
    }
    function getSVG() {
        const svg = document.querySelector('svg');
        const s = new XMLSerializer().serializeToString(svg);
        return 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(s)));
    }
    function exportSVG() { const l = document.createElement("a"); l.href = getSVG(); l.download = "system_map.svg"; l.click(); }
    function exportPNG() {
        const c = document.createElement("canvas"); c.width = width; c.height = height;
        const ctx = c.getContext("2d"), img = new Image();
        img.onload = () => { ctx.fillStyle = "#414142"; ctx.fillRect(0,0,width,height); ctx.drawImage(img,0,0); const l = document.createElement("a"); l.href = c.toDataURL(); l.download = "system_map.png"; l.click(); };
        img.src = getSVG();
    }
</script>
